<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: "en" }}">

  {%- include head.html -%}

  <body>

    {%- include header.html -%}

    
    <main class="page-content" aria-label="Content">
      <div class="wrapper">
        {{ content }}
      </div>
    </main>

    {%- include footer.html -%}

    <!-- Copy button for code blocks -->
    <style>
      .code-block-wrapper { position: relative; }
      .copy-btn {
        position: absolute; top: 6px; right: 6px;
        width: 28px; height: 28px; padding: 0;
        background: rgba(80,80,80,0.7); border: none; border-radius: 5px;
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        transition: background 0.2s;
      }
      .copy-btn:hover { background: rgba(80,80,80,1); }
      .copy-btn svg { width: 15px; height: 15px; stroke: #ddd; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.2s; }
      .copy-btn.copied svg { stroke: #4dbb7a; }
    </style>
    <script>
      (function() {
        var clipIcon = '<svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
        var checkIcon = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';

        document.querySelectorAll('.post-content pre, .page-content pre').forEach(function(pre) {
          var wrapper = document.createElement('div');
          wrapper.className = 'code-block-wrapper';
          pre.parentNode.insertBefore(wrapper, pre);
          wrapper.appendChild(pre);

          var btn = document.createElement('button');
          btn.className = 'copy-btn';
          btn.innerHTML = clipIcon;
          btn.title = 'Copy';
          wrapper.appendChild(btn);

          btn.addEventListener('click', function() {
            var code = pre.querySelector('code') || pre;
            navigator.clipboard.writeText(code.innerText).then(function() {
              btn.innerHTML = checkIcon;
              btn.classList.add('copied');
              setTimeout(function() {
                btn.innerHTML = clipIcon;
                btn.classList.remove('copied');
              }, 2000);
            });
          });
        });
      })();
    </script>

    <!-- Lightbox -->
    <div id="lightbox" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:9999;cursor:zoom-out;align-items:center;justify-content:center;">
      <img id="lightbox-img" style="max-width:95vw;max-height:95vh;object-fit:contain;box-shadow:0 4px 32px rgba(0,0,0,0.6);">
    </div>
    <script>
      (function() {
        var lb = document.getElementById('lightbox');
        var lbImg = document.getElementById('lightbox-img');

        document.querySelectorAll('.post-content img, .page-content img').forEach(function(img) {
          img.style.cursor = 'zoom-in';
          img.addEventListener('click', function() {
            lbImg.src = img.src;
            lbImg.alt = img.alt;
            lb.style.display = 'flex';
          });
        });

        lb.addEventListener('click', function() {
          lb.style.display = 'none';
          lbImg.src = '';
        });

        document.addEventListener('keydown', function(e) {
          if (e.key === 'Escape') {
            lb.style.display = 'none';
            lbImg.src = '';
          }
        });
      })();
    </script>

  </body>

</html>
